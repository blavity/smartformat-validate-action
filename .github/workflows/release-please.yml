# Release Please Workflow
#
# Purpose
# Automates versioning, changelog generation, and GitHub releases for
# smartformat-validate-action using conventional commits.
#
# How it works:
#   1. On push to main → creates/updates a release PR with changelog + version bump
#   2. On release PR merge → creates GitHub Release + git tag (e.g., v1.2.3)
#   3. The tag triggers release.yml which moves the floating major tag (v1)
#
# Conventional commits drive changelog generation:
#   feat(validate): add snf:advertisement check   → Features
#   fix(validate): handle UTF-16 encoded feeds    → Bug Fixes
#   chore: update dependencies                    → Miscellaneous
#
# Callers reference:
#   @v1       — latest stable (recommended)
#   @v1.2.3   — pinned to exact version

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
